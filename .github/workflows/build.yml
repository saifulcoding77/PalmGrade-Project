name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip colormake build-essential python3-dev libffi-dev libssl-dev
          sudo apt install -y autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # Langkah 1: Buang sisa binaan lama yang rosak
          rm -rf .buildozer/
          
          # Langkah 2: Jalankan build dengan log tahap 2 (debug)
          # Kita tidak gunakan 'yes |' di depan supaya kita boleh nampak ralat sebenar
          buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          # Paksa sistem gunakan NDK yang dimuat turun oleh Buildozer sendiri
          ANDROID_NDK_HOME: ""
