name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # Kemas kini ke v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Kemas kini ke v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip colormake build-essential python3-dev libffi-dev libssl-dev
          sudo apt install -y autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # Menggunakan 'yes' untuk menerima semua lesen Android secara automatik semasa proses build
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4 # KEMAS KINI KE V4 (WAJIB)
        with:
          name: PalmGrade-AI-${{ github.run_number }} # Nama unik menggunakan nombor larian
          path: bin/*.apk
