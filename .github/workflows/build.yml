name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip colormake build-essential python3-dev libffi-dev libssl-dev
          sudo apt install -y autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Accept Android SDK Licenses
        run: |
          # Arahan ini akan menjawab 'y' (yes) kepada semua terma Android SDK secara automatik
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        run: |
          # Tambah 'yes |' sekali lagi di sini sebagai langkah keselamatan
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PalmGrade-AI-Debug
          path: bin/*.apk
