steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip colormake build-essential python3-dev libffi-dev libssl-dev
          sudo apt install -y autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpc-dev
          # Keperluan tambahan untuk Android SDK
          sudo apt install -y openjdk-17-jdk-headless 
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # 1. Bersihkan sisa lama
          rm -rf .buildozer/
          
          # 2. Mulakan binaan - Buildozer akan muat turun SDK asas dahulu
          # Kita biarkan ia gagal sekejap jika perlu untuk cipta struktur folder
          buildozer android debug || true
          
          # 3. FIX: Pasang build-tools & aidl secara manual jika hilang
          export ANDROID_SDK_HOME=$HOME/.buildozer/android/platform/android-sdk
          if [ -d "$ANDROID_SDK_HOME" ]; then
            yes | $ANDROID_SDK_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_HOME "build-tools;33.0.0" "platforms;android-33" "platform-tools"
          fi
          
          # 4. Jalankan semula binaan sebenar
          yes | buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
